services:
  polaris:
    image: apache/polaris:1.3.0-incubating
    container_name: polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    depends_on:
      minio:
        condition: service_healthy
      mc:
        condition: service_completed_successfully
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      polaris.realm-context.realms: POLARIS
      polaris.features."ALLOW_INSECURE_STORAGE_TYPES": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": '["FILE","S3","GCS","AZURE"]'
      polaris.readiness.ignore-severe-issues: "true"
      quarkus.otel.sdk.disabled: "true"
    networks:
      - iceberg
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    networks:
      iceberg:
        aliases:
          - warehouse.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 10s
      retries: 5

  mc:
    image: minio/mc
    container_name: mc
    networks:
      - iceberg
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - >-
        mc alias set minio http://minio:9000 admin password &&
        mc mb --ignore-existing minio/warehouse &&
        mc anonymous set public minio/warehouse &&
        echo Bucket setup complete.

  polaris-setup:
    image: alpine/curl:8.17.0
    container_name: polaris-setup
    depends_on:
      polaris:
        condition: service_healthy
    networks:
      - iceberg
    environment:
      - CLIENT_ID=root
      - CLIENT_SECRET=s3cr3t
      - CATALOG_NAME=rest
      - REALM=POLARIS
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        apk add --no-cache jq > /dev/null 2>&1

        echo "Obtaining root access token..."
        TOKEN=$$(curl --fail-with-body -s -X POST http://polaris:8181/api/catalog/v1/oauth/tokens \
          -H 'Content-Type: application/x-www-form-urlencoded' \
          -d "grant_type=client_credentials&client_id=$${CLIENT_ID}&client_secret=$${CLIENT_SECRET}&scope=PRINCIPAL_ROLE:ALL" \
          | jq -r '.access_token')

        echo "Creating catalog '$${CATALOG_NAME}'..."
        curl --fail-with-body -s -X POST http://polaris:8181/api/management/v1/catalogs \
          -H "Authorization: Bearer $${TOKEN}" \
          -H "Accept: application/json" \
          -H "Content-Type: application/json" \
          -H "Polaris-Realm: $${REALM}" \
          -d '{
            "catalog": {
              "name": "'$${CATALOG_NAME}'",
              "type": "INTERNAL",
              "readOnly": false,
              "properties": {
                "default-base-location": "s3://warehouse/"
              },
              "storageConfigInfo": {
                "storageType": "S3",
                "allowedLocations": ["s3://warehouse/"],
                "endpoint": "http://localhost:9000",
                "endpointInternal": "http://minio:9000",
                "pathStyleAccess": true
              }
            }
          }'

        echo ""
        echo "Creating principal 'iceberg_user'..."
        PRINCIPAL_RESPONSE=$$(curl --fail-with-body -s -X POST http://polaris:8181/api/management/v1/principals \
          -H "Authorization: Bearer $${TOKEN}" \
          -H "Polaris-Realm: $${REALM}" \
          -H "Content-Type: application/json" \
          -d '{"principal": {"name": "iceberg_user", "properties": {}}}')

        USER_CLIENT_ID=$$(echo $${PRINCIPAL_RESPONSE} | jq -r '.credentials.clientId')
        USER_CLIENT_SECRET=$$(echo $${PRINCIPAL_RESPONSE} | jq -r '.credentials.clientSecret')
        echo "User clientId: $${USER_CLIENT_ID}"

        echo "Creating principal role..."
        curl --fail-with-body -s -X POST http://polaris:8181/api/management/v1/principal-roles \
          -H "Authorization: Bearer $${TOKEN}" \
          -H "Polaris-Realm: $${REALM}" \
          -H "Content-Type: application/json" \
          -d '{"principalRole": {"name": "iceberg_role", "properties": {}}}' > /dev/null

        echo "Assigning roles..."
        curl --fail-with-body -s -X PUT http://polaris:8181/api/management/v1/principals/iceberg_user/principal-roles \
          -H "Authorization: Bearer $${TOKEN}" \
          -H "Polaris-Realm: $${REALM}" \
          -H "Content-Type: application/json" \
          -d '{"principalRole": {"name": "iceberg_role"}}' > /dev/null

        curl --fail-with-body -s -X PUT http://polaris:8181/api/management/v1/principal-roles/iceberg_role/catalog-roles/$${CATALOG_NAME} \
          -H "Authorization: Bearer $${TOKEN}" \
          -H "Polaris-Realm: $${REALM}" \
          -H "Content-Type: application/json" \
          -d '{"catalogRole": {"name": "catalog_admin"}}' > /dev/null

        echo "Granting CATALOG_MANAGE_CONTENT on catalog_admin..."
        curl --fail-with-body -s -X PUT http://polaris:8181/api/management/v1/catalogs/$${CATALOG_NAME}/catalog-roles/catalog_admin/grants \
          -H "Authorization: Bearer $${TOKEN}" \
          -H "Polaris-Realm: $${REALM}" \
          -H "Content-Type: application/json" \
          -d '{"type": "catalog", "privilege": "CATALOG_MANAGE_CONTENT"}' > /dev/null

        echo ""
        echo "=========================================="
        echo "Polaris setup complete!"
        echo "=========================================="
        echo "Catalog:      $${CATALOG_NAME}"
        echo "Location:     s3://warehouse/"
        echo ""
        echo "Root credentials:"
        echo "  Client ID:     $${CLIENT_ID}"
        echo "  Client Secret: $${CLIENT_SECRET}"
        echo ""
        echo "User credentials:"
        echo "  Client ID:     $${USER_CLIENT_ID}"
        echo "  Client Secret: $${USER_CLIENT_SECRET}"
        echo ""
        echo "REST API:     http://localhost:8181/api/catalog"
        echo "OAuth tokens: http://localhost:8181/api/catalog/v1/oauth/tokens"
        echo "MinIO UI:     http://localhost:9001"
        echo "=========================================="

        touch /tmp/polaris-setup-done
        tail -f /dev/null
    healthcheck:
      interval: 1s
      timeout: 10s
      retries: 240
      test: ["CMD", "test", "-f", "/tmp/polaris-setup-done"]

networks:
  iceberg:
