services:
  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    networks:
      - iceberg
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    networks:
      iceberg:
        aliases:
          - warehouse.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]

  mc:
    image: minio/mc
    container_name: mc
    networks:
      - iceberg
    depends_on:
      - minio
    entrypoint: /bin/sh -c "until /usr/bin/mc alias set minio http://minio:9000 admin password; do echo 'waiting for minio...' && sleep 1; done; /usr/bin/mc mb --ignore-existing minio/warehouse; /usr/bin/mc anonymous set public minio/warehouse; tail -f /dev/null"

networks:
  iceberg:
